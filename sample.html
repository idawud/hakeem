<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            background: #1a0f2e;
            color: #f0e6d3;
            min-height: 100vh;
            padding: 0;
        }

        .app {
            max-width: 540px;
            margin: 0 auto;
            padding: 0 0 60px;
        }

        .header {
            text-align: center;
            padding: 28px 20px 16px;
            background: linear-gradient(180deg, #0f0820 0%, #1a0f2e 100%);
            border-bottom: 1px solid rgba(255, 200, 80, 0.15);
        }

        .stars {
            font-size: 18px;
            letter-spacing: 6px;
            opacity: 0.7;
            margin-bottom: 6px;
        }

        .app-title {
            font-size: 22px;
            color: #f5c842;
            font-weight: normal;
            letter-spacing: 1px;
        }

        .app-sub {
            font-size: 12px;
            color: #c8a96e;
            margin-top: 4px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .time-tabs {
            display: flex;
            margin: 20px 16px 0;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 200, 80, 0.2);
        }

        .tab {
            flex: 1;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            font-family: Georgia, serif;
            background: rgba(255, 255, 255, 0.04);
            color: #c8a96e;
            border: none;
            transition: all 0.25s;
        }

        .tab.active {
            background: linear-gradient(135deg, #c8860a, #f5c842);
            color: #1a0f2e;
            font-weight: bold;
        }

        .tab-icon {
            font-size: 18px;
            display: block;
            margin-bottom: 3px;
        }

        .story-list {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .story-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 200, 80, 0.15);
            border-radius: 14px;
            padding: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .story-card:hover {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 200, 80, 0.35);
            transform: translateY(-1px);
        }

        .card-top {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .card-icon {
            font-size: 30px;
            min-width: 40px;
            text-align: center;
            line-height: 1;
            margin-top: 2px;
        }

        .card-meta {
            flex: 1;
        }

        .card-title {
            font-size: 16px;
            color: #f5c842;
            font-weight: normal;
            line-height: 1.35;
            margin-bottom: 4px;
        }

        .card-tags {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-top: 6px;
        }

        .tag {
            font-size: 10px;
            padding: 2px 7px;
            border-radius: 20px;
            font-family: 'Helvetica Neue', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tag-gh {
            background: rgba(0, 150, 57, 0.25);
            color: #4ec97a;
            border: 1px solid rgba(0, 150, 57, 0.3);
        }

        .tag-is {
            background: rgba(0, 100, 200, 0.25);
            color: #70b8ff;
            border: 1px solid rgba(0, 100, 200, 0.3);
        }

        .tag-uk {
            background: rgba(200, 50, 50, 0.25);
            color: #ff8080;
            border: 1px solid rgba(200, 50, 50, 0.3);
        }

        .card-preview {
            font-size: 13px;
            color: #b09070;
            margin-top: 10px;
            line-height: 1.5;
            font-style: italic;
        }

        /* Story reader overlay */
        .reader-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #0f0820;
            z-index: 100;
            overflow-y: auto;
        }

        .reader-overlay.open {
            display: block;
        }

        .reader-header {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid rgba(255, 200, 80, 0.15);
            position: sticky;
            top: 0;
            background: #0f0820;
            z-index: 10;
        }

        .back-btn {
            background: none;
            border: 1px solid rgba(255, 200, 80, 0.3);
            color: #f5c842;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-family: Georgia, serif;
        }

        .reader-time-badge {
            margin-left: auto;
            font-size: 11px;
            color: #c8a96e;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .reader-body {
            padding: 24px 20px 48px;
            max-width: 540px;
            margin: 0 auto;
        }

        .reader-icon {
            font-size: 52px;
            text-align: center;
            margin-bottom: 12px;
        }

        .reader-title {
            font-size: 22px;
            color: #f5c842;
            text-align: center;
            font-weight: normal;
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .reader-tags {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 24px;
        }

        .divider {
            text-align: center;
            color: rgba(245, 200, 66, 0.3);
            font-size: 20px;
            letter-spacing: 8px;
            margin: 20px 0;
        }

        .story-text {
            font-size: 17px;
            line-height: 1.85;
            color: #e8d8c0;
        }

        .story-text p {
            margin-bottom: 18px;
        }

        .lesson-box {
            background: rgba(245, 200, 66, 0.08);
            border: 1px solid rgba(245, 200, 66, 0.2);
            border-radius: 12px;
            padding: 16px 18px;
            margin-top: 28px;
        }

        .lesson-label {
            font-size: 11px;
            color: #f5c842;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-family: 'Helvetica Neue', sans-serif;
        }

        .lesson-text {
            font-size: 15px;
            color: #d4c0a0;
            line-height: 1.6;
            font-style: italic;
        }

        .dua-box {
            background: rgba(0, 100, 200, 0.1);
            border: 1px solid rgba(0, 100, 200, 0.25);
            border-radius: 12px;
            padding: 16px 18px;
            margin-top: 14px;
        }

        .dua-arabic {
            font-size: 20px;
            text-align: center;
            color: #90c0ff;
            margin-bottom: 8px;
            line-height: 1.8;
            direction: rtl;
        }

        .dua-translation {
            font-size: 13px;
            color: #8aabce;
            text-align: center;
            font-style: italic;
        }

        .nav-btns {
            display: flex;
            gap: 10px;
            margin-top: 32px;
        }

        .nav-btn {
            flex: 1;
            padding: 13px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-family: Georgia, serif;
            transition: all 0.2s;
            border: 1px solid rgba(255, 200, 80, 0.3);
            background: rgba(255, 200, 80, 0.08);
            color: #f5c842;
        }

        .nav-btn:hover {
            background: rgba(255, 200, 80, 0.15);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }

        .progress-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(255, 200, 80, 0.2);
            transition: all 0.2s;
            cursor: pointer;
        }

        .dot.active {
            background: #f5c842;
            transform: scale(1.3);
        }

        .greeting-bar {
            text-align: center;
            padding: 10px 16px;
            font-size: 13px;
            color: #c8a96e;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="header">
            <div class="stars">✦ ✦ ✦</div>
            <div class="app-title">Stories for My Son</div>
            <div class="app-sub">Ghanaian · Islamic · British</div>
        </div>

        <div class="greeting-bar" id="greeting"></div>

        <div class="time-tabs">
            <button class="tab active" id="tab-morning" onclick="switchTab('morning')">
                <span class="tab-icon">🌅</span> Morning
            </button>
            <button class="tab" id="tab-evening" onclick="switchTab('evening')">
                <span class="tab-icon">🌙</span> Evening
            </button>
        </div>

        <div class="story-list" id="story-list"></div>
    </div>

    <div class="reader-overlay" id="reader">
        <div class="reader-header">
            <button class="back-btn" onclick="closeReader()">← Back</button>
            <span class="reader-time-badge" id="reader-time-badge"></span>
        </div>
        <div class="reader-body" id="reader-body"></div>
    </div>

    <script>
        const stories = {
            morning: [
                {
                    icon: "🕷️",
                    title: "Anansi and the Stolen Yams",
                    tags: ["Ghanaian", "Islamic", "British"],
                    preview: "Anansi learns that cleverness without honesty leaves an empty belly...",
                    text: [
                        "Long ago in Kumasi, when the sky was still low enough to touch, Anansi the Spider was very hungry. The rains had been late, and his yam patch had given nothing. But his neighbour Kofi — a kind, quiet man — had yams piled high like a little mountain.",
                        "One night, Anansi crept to Kofi's garden and took three fat yams. He cooked them quietly, ate them happily, and told himself, \"Nobody saw. Nobody knows.\"",
                        "But Allah sees everything, my son. Everything.",
                        "The next morning, Kofi knocked on Anansi's door. \"Brother, someone took my yams. I don't know who. But I am not angry — whoever did it must have been very hungry. I hope Allah fills their belly.\"",
                        "Anansi felt something hot and heavy in his chest — heavier than the yams he had eaten. That heavy feeling is called shame, and it comes when we know we have done wrong.",
                        "He went inside, brought out his best cloth — the one his grandmother had woven — and placed it at Kofi's feet. \"It was me,\" he said. \"I was hungry and afraid to ask. I am sorry.\"",
                        "Kofi smiled and lifted him up. \"Honesty after a mistake is even braver than never making one. Come, let us share breakfast together.\"",
                        "And from that day, Anansi learned: the cleverest thing a man can do is tell the truth."
                    ],
                    lesson: "If you ever make a mistake, the bravest thing you can do is say \"I'm sorry\" and mean it. Allah loves those who are honest, even when it is hard.",
                    dua: { arabic: "رَبِّ اجْعَلْنِي مُقِيمَ الصَّلَاةِ", translation: "\"My Lord, make me one who establishes prayer\" — Surah Ibrahim 14:40" }
                },
                {
                    icon: "🥁",
                    title: "The Boy Who Heard the Drum",
                    tags: ["Ghanaian", "British"],
                    preview: "When Kwame moves to London, he feels lost — until he listens to something deep inside...",
                    text: [
                        "Kwame was eight years old when his family moved from Accra to London. The sky was grey, the food was strange, and nobody at school could say his name right. \"Kuh-WAH-may,\" he said again and again, patiently, the way his mother taught him.",
                        "At break time, he sat alone on a bench. He could hear, far away inside his chest, a sound — ba-dum, ba-dum — like the fontomfrom drums his grandfather played at ceremonies back home.",
                        "A boy called Marcus came and sat beside him. \"You look sad,\" said Marcus. \"First week?\" Kwame nodded. \"It gets better,\" said Marcus. \"What's your name actually?\" Kwame told him. \"Cool name,\" said Marcus. \"Mine's boring.\"",
                        "Kwame smiled for the first time that day.",
                        "In class, the teacher asked everyone to share something from their family. Most children talked about holidays. Kwame stood up and said: \"My grandfather is a master drummer. In Ghana, the drum is a language. It can say: the chief is coming, or: someone has died, or: come, we are celebrating. My name, Kwame, means born on Saturday — and on Saturday mornings, my grandfather always drums.\"",
                        "The class was completely silent. Then they all wanted to know more.",
                        "That evening, Kwame wrote to his grandfather: \"Grandpa, I brought you to London today. Nobody laughed. They listened.\""
                    ],
                    lesson: "Your name, your language, your people — these are gifts. Never be ashamed of them. The things that make you different are often the things people most want to know.",
                    dua: { arabic: "اللَّهُمَّ أَعِنِّي عَلَى ذِكْرِكَ وَشُكْرِكَ وَحُسْنِ عِبَادَتِكَ", translation: "\"O Allah, help me remember You, thank You, and worship You in the best way\" — Abu Dawud" }
                },
                {
                    icon: "🦁",
                    title: "The Lion Who Was Afraid of the Dark",
                    tags: ["Islamic", "British"],
                    preview: "Even the bravest of all creatures has something to teach us about fear and trust...",
                    text: [
                        "In a wide golden savannah, there was a young lion named Asad. His mane was just beginning to grow — little tufts above his ears like a crown not yet finished — and everyone said he would be the greatest lion the pride had ever known.",
                        "But every night, when the sun went down and the stars came out, Asad would not leave his mother's side. \"The dark is too dark,\" he whispered.",
                        "One evening, an old tortoise called Musa was passing slowly by. \"Young lion,\" said Musa, \"what do you fear in the darkness?\" \"I don't know what is there,\" said Asad.",
                        "\"Ah,\" said Musa. \"Neither do I. But I know Who made the darkness, the same as Who made the light. And that One does not sleep.\"",
                        "\"Who?\" asked Asad. \"Allah,\" said the tortoise simply, and continued walking.",
                        "That night, Asad looked up at the stars. He remembered: Allah made every one of those stars. Allah made the darkness. Allah made me. And Allah does not sleep.",
                        "He stepped out from his mother's side — just three steps — into the warm dark night. The grass smelled of rain. Crickets sang. Nothing bad happened.",
                        "\"Good,\" said his mother quietly, watching him. \"That is called tawakkul — trust in Allah. It is the beginning of all courage.\""
                    ],
                    lesson: "It is okay to feel afraid. Even lions feel afraid. But when you remember that Allah is always watching over you, you can take that first brave step.",
                    dua: { arabic: "حَسْبِيَ اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ ۖ عَلَيْهِ تَوَكَّلْتُ", translation: "\"Allah is sufficient for me; there is no god but Him. In Him I place my trust.\" — Surah At-Tawbah 9:129" }
                }
            ],
            evening: [
                {
                    icon: "🌿",
                    title: "The River That Remembered",
                    tags: ["Ghanaian", "Islamic"],
                    preview: "A boy learns from the Volta River that kindness never disappears...",
                    text: [
                        "Near the banks of the great Volta River, there lived a boy named Yaw. Every evening he would come to the river to wash his face before Maghrib prayer.",
                        "One evening, he found a small fish flopping on the bank, gasping. A fisherman had dropped it and walked on. Yaw scooped it up gently and placed it back in the water. \"Go,\" he said softly. The fish flicked its tail and vanished.",
                        "Weeks later, Yaw fell into the river during the rainy season when the current was strong. He tumbled and tumbled, swallowing water, unable to swim to shore.",
                        "Then he felt something — a firm push against his back, gentle but powerful, steering him toward a rock where he could grab hold. He pulled himself up, gasping. He looked back into the brown rushing water.",
                        "A silver tail flickered, then was gone.",
                        "He ran home. His grandmother was making groundnut soup. He told her what had happened. She stirred the pot slowly and said: \"The Akan people say: Onipa na ohwɛ onipa — it is a person who looks after another person. But kindness travels further than people. It travels through water, through air, through years. Allah does not let a good deed disappear, my son. Not ever.\"",
                        "Yaw sat by the fire and remembered the fish. He understood now that every kind thing he did was a seed dropped into a river he could not see. And rivers always find their way home."
                    ],
                    lesson: "Every single kind thing you do matters, even when no one is watching. Allah sees it. And kindness has a way of coming back to you, sometimes from places you never expect.",
                    dua: { arabic: "اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَفْوَ وَالْعَافِيَةَ", translation: "\"O Allah, I ask You for pardon and wellbeing.\" — Ibn Majah" }
                },
                {
                    icon: "⭐",
                    title: "When Grandma Taught Salah",
                    tags: ["Islamic", "British"],
                    preview: "Ibrahim's grandmother visits from Kumasi, and teaches him something school never could...",
                    text: [
                        "When Ibrahim was seven, his grandmother Maame flew from Kumasi to Birmingham to stay for the whole of winter. She wore two jumpers on top of each other and still said \"Ei! This cold!\" every single day.",
                        "Ibrahim was embarrassed to pray at school. When Dhuhr time came, he would stay in the library and pretend to read. It was easier. Nobody asked questions.",
                        "One evening, Maame unrolled her prayer mat — the green and gold one she had brought from home — and began to pray. Ibrahim sat on the sofa and watched.",
                        "The way she prayed was different from anyone he had seen. She was completely still between movements. Like the whole world had gone quiet inside her.",
                        "Afterwards she called him over. \"Come, sit.\" She took his small hands in her big warm ones. \"Why do you not pray at school?\" she asked.",
                        "\"They'll think it's weird,\" he said quietly. She nodded slowly. \"Do you know, when I was young, I walked four miles to the mosque because there was none in our village. In the mud. My shoes would be red by the time I arrived.\" She smiled. \"And I thought: Allah is worth four miles in the mud. Is He worth five minutes in a library?\"",
                        "The next day, Ibrahim asked his teacher for a quiet room. She said yes straight away. He laid his jumper on the floor as a mat. He prayed.",
                        "It was the best Dhuhr he had ever prayed."
                    ],
                    lesson: "Prayer is a gift — one that belongs to you, wherever you are. You never have to be ashamed of speaking to Allah. He is always listening.",
                    dua: { arabic: "رَبِّ أَوْزِعْنِي أَنْ أَشْكُرَ نِعْمَتَكَ الَّتِي أَنْعَمْتَ عَلَيَّ", translation: "\"My Lord, enable me to be grateful for the favour You have given me.\" — Surah An-Naml 27:19" }
                },
                {
                    icon: "🌙",
                    title: "The Night of a Thousand Names",
                    tags: ["Ghanaian", "Islamic", "British"],
                    preview: "On the night before his first day of secondary school, a boy counts his names and finds his courage...",
                    text: [
                        "The night before his first day at secondary school, Kofi-Ibrahim Asante couldn't sleep.",
                        "He had three names and felt like three different people. At school he was Kofi — easy to say, easy to forget. At the mosque he was Ibrahim — serious, grown-up, responsible. At home with Grandpa on WhatsApp, he was Nana — the little one, the loved one.",
                        "\"Which one should I be tomorrow?\" he asked the ceiling.",
                        "His father came in and sat on the edge of the bed. He said nothing for a moment. Then: \"Do you know what the Prophet ﷺ was called? He was called Al-Amin — the trustworthy one — by people who did not even share his faith. He was called Habib by those who loved him. He was called Messenger by angels.\"",
                        "\"Many names?\" said Kofi-Ibrahim. \"Many names,\" said his father. \"Because many people loved him in many ways. Your names are not confusion. They are a map of everyone who loves you.\"",
                        "\"Kofi is your grandfather's gift. Ibrahim is the name of a prophet who walked through fire and was not burned, because his trust in Allah was unshakeable. And Asante — that is a whole people, a whole history, warriors and kings and weavers and farmers, all standing behind you.\"",
                        "Kofi-Ibrahim was quiet. Then he said: \"That's a lot of people.\" His father laughed softly. \"Yes. So tomorrow, when you walk through those gates — you are not going alone.\""
                    ],
                    lesson: "You carry many people with you wherever you go — your family, your faith, your people. That is not a burden. That is a superpower.",
                    dua: { arabic: "رَبِّ اشْرَحْ لِي صَدْرِي وَيَسِّرْ لِي أَمْرِي", translation: "\"My Lord, expand my chest and ease my affairs.\" — Surah Ta-Ha 20:25-26" }
                }
            ]
        };

        let currentTab = 'morning';
        let currentStoryIndex = 0;

        function getGreeting() {
            const h = new Date().getHours();
            if (h < 12) return "Good morning — بِسْمِ اللَّهِ";
            if (h < 17) return "Good afternoon — الْحَمْدُ لِلَّهِ";
            return "Good evening — مَا شَاءَ اللَّهُ";
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-morning').classList.toggle('active', tab === 'morning');
            document.getElementById('tab-evening').classList.toggle('active', tab === 'evening');
            renderList();
        }

        function renderList() {
            const list = document.getElementById('story-list');
            const s = stories[currentTab];
            list.innerHTML = s.map((story, i) => `
    <div class="story-card" onclick="openStory(${i})">
      <div class="card-top">
        <div class="card-icon">${story.icon}</div>
        <div class="card-meta">
          <div class="card-title">${story.title}</div>
          <div class="card-tags">
            ${story.tags.map(t => `<span class="tag tag-${t === 'Ghanaian' ? 'gh' : t === 'Islamic' ? 'is' : 'uk'}">${t}</span>`).join('')}
          </div>
        </div>
      </div>
      <div class="card-preview">${story.preview}</div>
    </div>
  `).join('');
        }

        function openStory(index) {
            currentStoryIndex = index;
            const s = stories[currentTab];
            const story = s[index];

            document.getElementById('reader-time-badge').textContent = currentTab === 'morning' ? '🌅 Morning story' : '🌙 Evening story';

            const body = document.getElementById('reader-body');
            body.innerHTML = `
    <div class="reader-icon">${story.icon}</div>
    <div class="reader-title">${story.title}</div>
    <div class="reader-tags">
      ${story.tags.map(t => `<span class="tag tag-${t === 'Ghanaian' ? 'gh' : t === 'Islamic' ? 'is' : 'uk'}">${t}</span>`).join('')}
    </div>
    <div class="divider">✦ ✦ ✦</div>
    <div class="story-text">
      ${story.text.map(p => `<p>${p}</p>`).join('')}
    </div>
    <div class="lesson-box">
      <div class="lesson-label">📖 Lesson for you, my son</div>
      <div class="lesson-text">${story.lesson}</div>
    </div>
    <div class="dua-box">
      <div class="dua-arabic">${story.dua.arabic}</div>
      <div class="dua-translation">${story.dua.translation}</div>
    </div>
    <div class="nav-btns">
      <button class="nav-btn" onclick="prevStory()" ${index === 0 ? 'disabled' : ''}>← Previous</button>
      <button class="nav-btn" onclick="nextStory()" ${index === s.length - 1 ? 'disabled' : ''}>Next →</button>
    </div>
    <div class="progress-dots">
      ${s.map((_, i) => `<div class="dot ${i === index ? 'active' : ''}" onclick="openStory(${i})"></div>`).join('')}
    </div>
  `;

            document.getElementById('reader').classList.add('open');
            document.getElementById('reader').scrollTo(0, 0);
        }

        function closeReader() {
            document.getElementById('reader').classList.remove('open');
        }

        function prevStory() {
            if (currentStoryIndex > 0) openStory(currentStoryIndex - 1);
        }

        function nextStory() {
            if (currentStoryIndex < stories[currentTab].length - 1) openStory(currentStoryIndex + 1);
        }

        // Auto-select tab by time of day
        const hour = new Date().getHours();
        if (hour >= 17 || hour < 6) switchTab('evening');
        else switchTab('morning');

        document.getElementById('greeting').textContent = getGreeting();
        renderList();
    </script>
</body>

</html>
